name: CI

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + vitest + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install root deps
        run: npm ci
      - name: Audit root dependencies
        run: npm audit --audit-level=moderate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Vitest with coverage
        run: npm run test:coverage
      - name: Smoke tests
        run: npm run test:smoke
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  # UI E2E (Playwright) is intentionally NOT run in CI — it's a local-only
  # tier in the testing ladder (see docs/TESTING.md and AGENTS.md rule 1).
  # Reasons: 119 specs × 1 worker × retry ≈ 30 min runtime, plus the suite
  # currently has pre-existing rot that needs a dedicated de-rot pass.
  # Backend smoke + vitest cover the daemon contract; UI typecheck + lint
  # + build + unit tests cover the frontend invariants.
  ui:
    name: UI (typecheck + lint + build + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
      - name: Install root deps
        run: npm ci
      - name: Install UI deps
        run: cd ui && npm ci
      - name: Audit UI dependencies
        run: cd ui && npm audit --audit-level=moderate
      - name: UI typecheck
        run: npm run typecheck:ui
      - name: UI lint
        run: npm run lint:ui
      - name: UI production build
        run: cd ui && npm run build
      - name: UI unit tests
        run: cd ui && npm test

  # Validates the artefact we actually publish to npm: builds dist/, packs
  # the tarball, installs it into a fresh tmp project, boots the daemon
  # from the tmp project's cwd (NOT the repo), and asserts /health = 200.
  # This is the only tier that catches:
  #   - cwd-relative path bugs (rc.2 shipped one because smoke harness
  #     spawned with cwd=repoRoot and accidentally hid it),
  #   - files dropped from the npm `files` allowlist in package.json,
  #   - tsc-only breakage (works under tsx, fails after a real build).
  # Cost: ~1.5–3 min (UI build + npm install). Worth it — every previous
  # release-blocker we've hit would have been caught here before publish.
  install-tarball:
    name: Install-tarball (build + pack + boot from non-repo cwd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
      - name: Install root deps
        run: npm ci
      - name: Install UI deps
        run: cd ui && npm ci
      - name: Build (dist + UI bundle)
        run: npm run build
      - name: Run install-tarball test
        run: npm run test:install-tarball:nobuild
